groups:
  - name: soundscapemap
    rules:
      - alert: VoteEndpointErrorRateHigh
        expr: rate(http_requests_total{route="/api/votes",status=~"5.."}[5m]) > 0.05
        for: 5m
        labels:
          severity: page
        annotations:
          summary: Vote endpoint error rate exceeds 5 percent.

      - alert: SpotifyCircuitOpen
        expr: soundscape_spotify_circuit_open == 1
        for: 1m
        labels:
          severity: ticket
        annotations:
          summary: Spotify circuit breaker is open.

      - alert: DatabaseWriteLatencyHigh
        expr: histogram_quantile(0.99, rate(db_write_latency_ms_bucket[5m])) > 500
        for: 5m
        labels:
          severity: page
        annotations:
          summary: Database write latency p99 is above 500ms.
